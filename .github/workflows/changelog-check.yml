name: Changelog Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: changelog-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changelog-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate CHANGELOG.md structure
        run: |
          node scripts/validate-changelog.js CHANGELOG.md
