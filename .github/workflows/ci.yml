name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIKE_VERSION: "8.0.1116"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Cache pike install
        id: cache-pike
        uses: actions/cache@v5
        with:
          path: ~/.pike
          key: pike-${{ env.PIKE_VERSION }}-${{ runner.os }}
      - name: Install build dependencies
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make gcc g++ libgmp-dev nettle-dev bison \
            libreadline-dev zlib1g-dev
      - name: Build Pike
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://pike.lysator.liu.se/pub/pike/all/${PIKE_VERSION}/Pike-v${PIKE_VERSION}.tar.gz" \
            | tar xz
          mkdir -p "Pike-v${PIKE_VERSION}/build"
          cd "Pike-v${PIKE_VERSION}/build"
          ../src/configure \
            --prefix="$HOME/.pike" \
            --without-debug \
            --without-mysql
          make -j$(nproc) || make
          make install
      - name: Verify pike binary
        run: |
          "$HOME/.pike/pike/${PIKE_VERSION}/bin/pike" --version

      - run: bun test
        env:
          PIKE_BINARY: /home/runner/.pike/pike/8.0.1116/bin/pike

      - name: Add Pike and pmp to PATH
        run: echo "$HOME/.pike/pike/8.0.1116/bin" >> $GITHUB_PATH && echo "$HOME/.pmp/bin" >> $GITHUB_PATH

      - name: Install pmp
        run: curl -LsSf https://raw.githubusercontent.com/TheSmuks/pmp/v0.5.0/install.sh | PMP_VERSION=v0.5.0 sh

      - name: Install Pike dependencies
        run: ~/.pmp/bin/pmp install

      - name: Run Pike tests
        run: bun run test:pike