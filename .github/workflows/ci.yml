name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIKE_VERSION: "8.0.1116"
  PIKE_PREFIX: "${{ github.workspace }}/.pike"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  build-pike:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Cache pike install
        id: cache-pike
        uses: actions/cache@v4
        with:
          path: ${{ env.PIKE_PREFIX }}
          key: pike-${{ env.PIKE_VERSION }}-${{ runner.os }}
      - name: Install build dependencies
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make gcc g++ libgmp-dev nettle-dev bison \
            libreadline-dev zlib1g-dev
      - name: Download and build Pike
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://pike.lysator.liu.se/pub/pike/all/${PIKE_VERSION}/Pike-v${PIKE_VERSION}.tar.gz" \
            | tar xz
          mkdir -p "Pike-v${PIKE_VERSION}/build"
          cd "Pike-v${PIKE_VERSION}/build"
          ../src/configure \
            --prefix="${PIKE_PREFIX}" \
            --without-debug \
            --without-mysql
          make -j$(nproc)
          make install

  test:
    needs: build-pike
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Restore pike install
        uses: actions/cache@v4
        with:
          path: ${{ env.PIKE_PREFIX }}
          key: pike-${{ env.PIKE_VERSION }}-${{ runner.os }}
      - run: bun test
        env:
          PIKE_BINARY: ${{ env.PIKE_PREFIX }}/pike/${{ env.PIKE_VERSION }}/bin/pike
