name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIKE_VERSION: "8.0.1116"

jobs:

  repository-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: bash scripts/check-adr-prefixes.sh

  typecheck:
    name: typecheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  pike-fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check

  unit-tests:
    name: unit-tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Run non-Pike tests
        if: matrix.os != 'ubuntu-latest'
        run: bun run test:non-pike
      - name: Run full Bun tests
        if: matrix.os == 'ubuntu-latest'
        run: bun test

  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/quality-gates.sh --all

  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Install VSCE
        run: bun add -g @vscode/vsce
      - run: bash scripts/smoke-test.sh

  vscode-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Install VSCode test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb libgtk-3-0 libgbm1 libasound2t64
      - name: Cache pike install
        id: cache-pike
        uses: actions/cache@v5
        with:
          path: ~/.pike
          key: pike-${{ env.PIKE_VERSION }}-${{ runner.os }}
      - name: Install Pike build dependencies
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make gcc g++ libgmp-dev nettle-dev bison \
            libreadline-dev zlib1g-dev
      - name: Build Pike
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://pike.lysator.liu.se/pub/pike/all/${PIKE_VERSION}/Pike-v${PIKE_VERSION}.tar.gz" \
            | tar xz
          mkdir -p "Pike-v${PIKE_VERSION}/build"
          cd "Pike-v${PIKE_VERSION}/build"
          ../src/configure \
            --prefix="$HOME/.pike" \
            --without-debug \
            --without-mysql
          make -j$(nproc) || make
          make install
      - name: Set Pike binary
        run: |
          echo "PIKE_BINARY=$HOME/.pike/pike/$PIKE_VERSION/bin/pike" >> "$GITHUB_ENV"
          "$HOME/.pike/pike/$PIKE_VERSION/bin/pike" --version
      - run: bash scripts/test-vscode.sh

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Cache pike install
        id: cache-pike
        uses: actions/cache@v5
        with:
          path: ~/.pike
          key: pike-${{ env.PIKE_VERSION }}-${{ runner.os }}
      - name: Install build dependencies
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make gcc g++ libgmp-dev nettle-dev bison \
            libreadline-dev zlib1g-dev
      - name: Build Pike
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://pike.lysator.liu.se/pub/pike/all/${PIKE_VERSION}/Pike-v${PIKE_VERSION}.tar.gz" \
            | tar xz
          mkdir -p "Pike-v${PIKE_VERSION}/build"
          cd "Pike-v${PIKE_VERSION}/build"
          ../src/configure \
            --prefix="$HOME/.pike" \
            --without-debug \
            --without-mysql
          make -j$(nproc) || make
          make install
      - name: Set and verify Pike binary
        run: |
          echo "PIKE_BINARY=$HOME/.pike/pike/$PIKE_VERSION/bin/pike" >> "$GITHUB_ENV"
          "$HOME/.pike/pike/$PIKE_VERSION/bin/pike" --version

      - name: Run Bun tests with real Pike oracle
        run: bun test

      - name: Add Pike and pmp to PATH
        run: echo "$HOME/.pike/pike/${PIKE_VERSION}/bin" >> $GITHUB_PATH && echo "$HOME/.pmp/bin" >> $GITHUB_PATH

      - name: Install pmp
        run: curl -LsSf https://raw.githubusercontent.com/TheSmuks/pmp/v0.5.0/install.sh | PMP_VERSION=v0.5.0 sh

      - name: Install Pike dependencies
        run: ~/.pmp/bin/pmp install

      - name: Run Pike tests
        run: bun run test:pike
