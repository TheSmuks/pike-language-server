name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension
        run: bun run build:extension

      - name: Package VSIX
        run: bash scripts/build-vsix.sh

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -e "console.log(require('./extension.package.json').version)")
          BUILD_NUM=$(date +%s | tail -c 7)
          gh release upload "${{ github.event.release.tag_name }}" "out/pike-language-server-${VERSION}+${BUILD_NUM}.vsix"