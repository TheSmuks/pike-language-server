name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release lineage
        run: bash scripts/check-release-lineage.sh "origin/main" "${{ github.event.release.tag_name }}"

      - name: Build extension
        run: bun run build:extension

      - name: Install VSIX packager
        run: bun add -g @vscode/vsce

      - name: Package VSIX
        run: bash scripts/build-vsix.sh

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VSIX_PATH=$(cat out/.latest-vsix)
          gh release upload "${{ github.event.release.tag_name }}" "$VSIX_PATH" --clobber